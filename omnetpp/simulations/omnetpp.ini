[General]
sim-time-limit = 300s
repeat = 50
seed-set = ${repetition}

output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
record-eventlog = false

# Recording
**.scalar-recording = true
**.vector-recording = false
**.app[*].packetSent:count = true
**.app[*].packetReceived:count = true
**.app[*].endToEndDelay:vector = true
**.app[*].packetReceivedLength:sum = true
**.energyStorage.residualEnergyCapacity:vector = true
**.energyStorage.residualEnergyCapacity:last = true
**.energyStorage.residualEnergyCapacity:min = true

# UDP traffic
*.source.numApps = 1
*.source.app[0].typename = "UdpBasicApp"
*.source.app[0].destAddresses = "destination"
*.source.app[0].destPort = 5000
*.source.app[0].messageLength = 512B
*.source.app[0].sendInterval = 1s
*.source.app[0].startTime = uniform(5s, 10s)

*.node[*].numApps = 1
*.node[*].app[0].typename = "UdpBasicApp"
*.node[*].app[0].destAddresses = "destination"
*.node[*].app[0].destPort = 5000
*.node[*].app[0].messageLength = 512B
*.node[*].app[0].sendInterval = 1s
*.node[*].app[0].startTime = uniform(5s, 10s)

*.destination.numApps = 1
*.destination.app[0].typename = "UdpSink"
*.destination.app[0].localPort = 5000
*.destination.app[0].startTime = 0s

# Network and AODV
**.wlan[*].bitrate = 24Mbps
*.configurator.addStaticRoutes = false
**.netmaskRoutes = ""
**.arp.typename = "GlobalArp"

**.routingApp.typename = "Aodv"
**.routingApp.activeRouteTimeout = 1s
**.routingApp.deletePeriod = 0.5s

# Linear UAV mobility in a 1000 m x 1000 m area
*.source.mobility.typename = "LinearMobility"
*.destination.mobility.typename = "LinearMobility"
*.node[*].mobility.typename = "LinearMobility"

*.source.mobility.initialX = 100m
*.source.mobility.initialY = 500m
*.destination.mobility.initialX = 900m
*.destination.mobility.initialY = 500m
*.node[*].mobility.initialX = uniform(20m, 980m)
*.node[*].mobility.initialY = uniform(20m, 980m)

*.source.mobility.initialMovementHeading = uniform(0deg, 360deg)
*.destination.mobility.initialMovementHeading = uniform(0deg, 360deg)
*.node[*].mobility.initialMovementHeading = uniform(0deg, 360deg)

*.source.mobility.speed = 10mps
*.destination.mobility.speed = 10mps
*.node[*].mobility.speed = 10mps

**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxX = 1000m
**.mobility.constraintAreaMaxY = 1000m
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.initialZ = 0m

# Radio and energy
**.transmitter.power = 1mW
**.hasStatus = true
**.energyStorage.typename = "SimpleEpEnergyStorage"
**.wlan[*].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
**.energyManagement.typename = "SimpleEpEnergyManagement"
**.energyStorage.nominalCapacity = 50J
**.energyStorage.initialCapacity = nominalCapacity
**.energyManagement.nodeShutdownCapacity = 0.1 * parent.energyStorage.nominalCapacity
**.energyManagement.nodeStartCapacity = 0.5 * parent.energyStorage.nominalCapacity

# Visualization
*.visualizer.*.numDataLinkVisualizers = 5
*.visualizer.*.dataLinkVisualizer[*].activityLevel = "peer"
*.visualizer.*.dataLinkVisualizer[*].displayLinks = true
*.visualizer.*.dataLinkVisualizer[0].packetFilter = "aodv::Rreq"
*.visualizer.*.dataLinkVisualizer[1].packetFilter = "UDP*"
*.visualizer.*.dataLinkVisualizer[1].*Color = "blue"
*.visualizer.*.dataLinkVisualizer[2].packetFilter = "aodv::Rrep"
*.visualizer.*.dataLinkVisualizer[2].*Color = "darkslategray"
*.visualizer.*.dataLinkVisualizer[3].packetFilter = "aodv::Rerr"
*.visualizer.*.dataLinkVisualizer[3].*Color = "red"
*.visualizer.*.dataLinkVisualizer[4].packetFilter = "Hello"
*.visualizer.*.dataLinkVisualizer[4].*Color = "green"

*.visualizer.*.routingTableVisualizer[0].displayLabels = false
*.visualizer.*.routingTableVisualizer[0].displayRoutesIndividually = false
*.visualizer.*.routingTableVisualizer[0].lineShift = 0
*.visualizer.*.routingTableVisualizer[0].displayRoutingTables = true
*.visualizer.*.routingTableVisualizer[0].destinationFilter = "destination"

*.visualizer.*.networkRouteVisualizer[0].displayRoutes = true
*.visualizer.*.networkRouteVisualizer[0].packetFilter = "UDP*"
*.visualizer.*.interfaceTableVisualizer[0].displayInterfaceTables = true
*.visualizer.*.interfaceTableVisualizer[0].format = "%a/%l"


[Config Normal30]
network = electrosvalpadoca_30
description = "Normal FANET scenario with 30 UAVs"


[Config Flooding30]
extends = Normal30
description = "Flooding scenario with 30 UAVs"
*.node[0].app[0].messageLength = 1024B
*.node[0].app[0].sendInterval = 1ms
*.node[0].app[0].startTime = 20s
*.node[0].app[0].stopTime = 280s


[Config Blackhole30]
extends = Normal30
description = "Blackhole scenario with 30 UAVs"
*.node[0].blackholeEnabled = true


